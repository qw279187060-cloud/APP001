name: build windows package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Build version (used in file and folder names)"
        required: true
        default: "0.11.4"

env:
  FLUTTER_VERSION: "3.27.4"
  RUST_TOOLCHAIN: "1.85.0"

jobs:
  build-windows:
    name: build windows x86_64
    # windows-2022: newer images (windows-2025) lack the Visual Studio C++
    # components Flutter 3.27 expects, so `flutter build windows` falls back
    # to the VS2019 generator and fails
    runs-on: windows-2022
    timeout-minutes: 180
    env:
      APP_VERSION: ${{ github.event.inputs.version }}
      WINDOWS_APP_RELEASE_PATH: frontend\appflowy_flutter\product\${{ github.event.inputs.version }}\windows
      WINDOWS_INSTALLER_NAME: AppFlowy-${{ github.event.inputs.version }}-windows-x86_64
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            frontend/rust-lib

      - name: Install prerequisites
        working-directory: frontend
        run: |
          vcpkg integrate install
          cargo install --force --locked cargo-make
          cargo install --force --locked duckscript_cli

      - name: Build Windows app
        working-directory: frontend
        # the cargo make script has to be run separately because of file locking issues
        run: |
          flutter config --enable-windows-desktop
          dart ./scripts/flutter_release_build/build_flowy.dart exclude-directives . ${{ env.APP_VERSION }}
          cargo make --env APP_VERSION=${{ env.APP_VERSION }} --profile production-windows-x86 appflowy
          dart ./scripts/flutter_release_build/build_flowy.dart include-directives . ${{ env.APP_VERSION }}

      - name: Upload portable app
        uses: actions/upload-artifact@v4
        with:
          name: AppFlowy-${{ env.APP_VERSION }}-windows-x86_64-portable
          path: ${{ env.WINDOWS_APP_RELEASE_PATH }}\

      - name: Copy installer config & icon file
        working-directory: frontend
        run: |
          cp scripts/windows_installer/* ../${{ env.WINDOWS_APP_RELEASE_PATH }}

      - name: Build installer executable
        working-directory: ${{ env.WINDOWS_APP_RELEASE_PATH }}
        run: |
          iscc /F${{ env.WINDOWS_INSTALLER_NAME }} inno_setup_config.iss /DAppVersion=${{ env.APP_VERSION }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.WINDOWS_INSTALLER_NAME }}-installer
          path: ${{ env.WINDOWS_APP_RELEASE_PATH }}\Output\${{ env.WINDOWS_INSTALLER_NAME }}.exe
